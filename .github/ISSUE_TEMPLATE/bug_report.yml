name: Bug Report
description: Report something that isn't working correctly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what you see.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: input
    id: version
    attributes:
      label: OpenBerth version
      description: Output of `berth --version` or `berth-server --version`.
      placeholder: v0.1.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (`berth logs <id>`, `journalctl -u openberth`).
      render: shell
